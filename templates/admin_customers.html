<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Management</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #764776, #5a3d6b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            max-width: 1000px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        nav {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        nav a {
            color: #764776;
            text-decoration: none;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        table, th, td {
            border: 1px solid #ccc;
        }
        th, td {
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #764776;
            color: white;
        }
        td a {
            color: #764776;
            text-decoration: none;
        }
        td a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Customer Management</h2>
        <nav>
            <a href="admin_dashboard.html">Dashboard</a>
            <a href="admin_contractors.html">Contractors</a>
            <a href="admin_bookings.html">Bookings</a>
            <a href="login.html">Logout</a>
        </nav>
        <table>
            <thead>
                <tr>
                    <th>Customer</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Address</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>John Doe</td>
                    <td>john@example.com</td>
                    <td>1234567890</td>
                    <td>123 Main St</td>
                    <td><a href="#">Edit</a> | <a href="#">Delete</a></td>
                </tr>
                <!-- More customer rows as needed -->
            </tbody>
        </table>
    </div>
</body>
</html>
