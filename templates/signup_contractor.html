<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contractor Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: url('/static/images/contractor.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 15px;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="mb-3">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% endwith %}

        <!-- Signup Form -->
        <h2 class="text-center">Contractor Signup</h2>
        <form action="/signup_contractor" method="POST">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" value="{{ request.form.get('username', '') }}" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" value="{{ request.form.get('email', '') }}" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Phone</label>
                <input type="text" class="form-control" id="phone" name="phone" value="{{ request.form.get('phone', '') }}" required>
            </div>
            <div class="mb-3">
                <label for="address" class="form-label">Address</label>
                <input type="text" class="form-control" id="address" name="address" value="{{ request.form.get('address', '') }}" required>
            </div>
            <div class="mb-3">
                <label for="city" class="form-label">City</label>
                <select id="city" name="city" class="form-control" required onchange="this.form.submit()">
                    <option value="" disabled {% if not selected_city %}selected{% endif %}>Select a city</option>
                    {% for city in city_malls.keys() %}
                        <option value="{{ city }}" {% if selected_city == city %}selected{% endif %}>{{ city }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label for="mall_name" class="form-label">Mall Name</label>
                <select id="mall_name" name="mall_name" class="form-control" required>
                    <option value="" disabled {% if not request.form.get('mall_name') %}selected{% endif %}>Select a mall</option>
                    {% for mall in malls %}
                        <option value="{{ mall }}" {% if request.form.get('mall_name') == mall %}selected{% endif %}>{{ mall }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label for="number_of_lots" class="form-label">Number of Lots</label>
                <input type="number" class="form-control" id="number_of_lots" name="number_of_lots" value="{{ request.form.get('number_of_lots', '') }}" required>
            </div>
            <div class="mb-3">
                <label for="prize" class="form-label">Prize</label>
                <input type="number" class="form-control" id="prize" name="prize" value="{{ request.form.get('prize', '') }}" required>
            </div>
            <button type="submit" name="submit_signup" class="btn btn-primary w-100">Sign Up</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
